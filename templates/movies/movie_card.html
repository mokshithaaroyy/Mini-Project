{% load static %}
<a href="{% url 'movie_detail' movie.pk %}" class="movie-card">
    <div class="poster">
        {% if movie.poster_url %}
            <img src="{{ movie.poster_url }}" alt="{{ movie.title }} poster" loading="lazy">
        {% else %}
            <div class="poster-fallback">
                <span>{{ movie.title|slice:":1" }}</span>
            </div>
        {% endif %}
        <div class="rating-badge">★ {{ movie.average_rating }}</div>
    </div>
    <div class="movie-card-info">
        <h3>{{ movie.title }}</h3>
        <p class="meta">{{ movie.release_year }} · {{ movie.language }}</p>
        <p class="genres">
            {% for g in movie.genres.all %}{{ g.name }}{% if not forloop.last %}, {% endif %}{% endfor %}
        </p>
    </div>
</a>
