{% extends 'base.html' %}
{% block title %}Login - MovieHub{% endblock %}
{% block content %}

<div class="auth-form">
    <h1>Login</h1>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-row">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<p class="field-error">{{ field.errors|striptags }}</p>{% endif %}
            </div>
        {% endfor %}
        <button type="submit">Login</button>
    </form>
    <p class="switch-link">No account? <a href="{% url 'signup' %}">Sign up here</a></p>
</div>

{% endblock %}
